name: Daily Analysis Pipeline

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 10:00 UTC = 5-6 AM ET, weekdays only
  workflow_dispatch:  # Manual trigger for testing
    inputs:
      ticker:
        description: 'Override ticker (leave empty for auto-select)'
        required: false
        type: string

jobs:
  generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: uv sync

      - name: Run pipeline
        working-directory: pipeline
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SEC_EDGAR_EMAIL: ${{ secrets.SEC_EDGAR_EMAIL }}
        run: |
          if [ -n "${{ inputs.ticker }}" ]; then
            uv run python -m frugal_pipeline.main --ticker "${{ inputs.ticker }}"
          else
            uv run python -m frugal_pipeline.main
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "post: add daily analysis for $(date +%Y-%m-%d)"
          title: "New Analysis: $(date +%Y-%m-%d)"
          body: |
            ## Daily Analysis Post

            Generated by the automated pipeline.

            **Review checklist:**
            - [ ] Data accuracy spot-check
            - [ ] Charts render correctly
            - [ ] Prose reads well
            - [ ] No sensitive data exposed
          branch: post/$(date +%Y-%m-%d)
          reviewers: sciortino
          delete-branch: true
          add-paths: |
            site/src/content/blog/
            site/public/charts/
            data/analyzed_log.json
